<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<title>Сюрприз для Королеви 👑</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a052d, #000);
    overflow: hidden;
    font-family: 'Comfortaa', sans-serif;
}

/* ГІРЛЯНДА */
.garland {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 0;
    margin: 0;
    z-index: 100;
    list-style: none;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.light {
    width: 14px;
    height: 18px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    top: -2px;
    animation: flash 1.5s infinite alternate;
}

.light:nth-child(4n+1) { background: #ff4d6d; box-shadow: 0 0 20px #ff4d6d; animation-delay: 0s; }
.light:nth-child(4n+2) { background: #45ffbc; box-shadow: 0 0 20px #45ffbc; animation-delay: 0.4s; }
.light:nth-child(4n+3) { background: #ffeb3b; box-shadow: 0 0 20px #ffeb3b; animation-delay: 0.8s; }
.light:nth-child(4n+4) { background: #00d4ff; box-shadow: 0 0 20px #00d4ff; animation-delay: 1.2s; }

@keyframes flash {
    from { opacity: 0.4; transform: scale(0.9); filter: brightness(1); }
    to { opacity: 1; transform: scale(1.1); filter: brightness(1.8); }
}

/* ЛЕТЯЧІ СЕРЦЯ */
.heart-particle {
    position: absolute;
    top: -20px;
    user-select: none;
    z-index: 1;
    pointer-events: none;
    animation: heartFall linear infinite;
    color: #ff4d6d;
}

@keyframes heartFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

.container {
    text-align: center;
    margin-top: 40px;
    position: relative;
    z-index: 10;
}

.title {
    font-family: 'Pacifico', cursive;
    font-size: 30px;
    color: #fff;
    margin-bottom: 25px;
    text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
}

.box { position: relative; cursor: pointer; }

.box-img {
    width: 250px;
    transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.open .box-img {
    transform: translateY(130px) scale(0.7);
    opacity: 0.2;
    filter: blur(5px);
}

/* СЮРПРИЗ */
.surprise {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

.open .surprise {
    transform: translate(-50%, calc(-50% - 30px)) scale(1);
    opacity: 1;
}

.glow-bg {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255, 77, 109, 0.3) 0%, transparent 70%);
    z-index: -1;
    animation: rotateGlow 5s infinite linear;
}

@keyframes rotateGlow {
    from { transform: rotate(0deg) scale(1); }
    to { transform: rotate(360deg) scale(1.1); }
}

.choco {
    display: flex;
    gap: 15px;
    margin-bottom: -10px;
}

.choco img {
    width: 160px;
    animation: float 3s infinite alternate ease-in-out;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-20px); }
}

.bear {
    width: 180px;
    opacity: 1 !important;
    filter: drop-shadow(0 5px 25px rgba(255, 107, 157, 0.5));
    z-index: 10;
}

.message {
    margin-top: 30px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    width: 320px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.btn-close {
    background: linear-gradient(45deg, #ff4d6d, #ff758c);
    border: none;
    color: white;
    padding: 10px 25px;
    border-radius: 20px;
    font-family: 'Comfortaa', sans-serif;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
}
</style>
</head>

<body>

<ul class="garland">
    <li class="light"></li><li class="light"></li><li class="light"></li><li class="light"></li>
    <li class="light"></li><li class="light"></li><li class="light"></li><li class="light"></li>
    <li class="light"></li><li class="light"></li><li class="light"></li><li class="light"></li>
    <li class="light"></li><li class="light"></li><li class="light"></li><li class="light"></li>
</ul>

<div class="container">
    <div class="title" id="title">Там нічого немає... ✨</div>

    <div class="box" id="box" onclick="openBox()">
        <img src="image_0.png" class="box-img">

        <div class="surprise">
            <div class="glow-bg"></div>
            <div class="choco">
                <img src="image_2.png" style="transform: rotate(-15deg)">
                <img src="image_2.png">
                <img src="image_2.png" style="transform: rotate(15deg)">
            </div>

            <img src="image_1.png" class="bear">

            <div class="message">
                <h2>Для моєї Королеви 👑💖</h2>
                <p>Нехай кожен твій день буде наповнений радістю, теплом і щастям.<br>
                Ти заслуговуєш лише найкращого 💕</p>
                <button class="btn-close" onclick="event.stopPropagation(); location.reload();">Спочатку</button>
            </div>
        </div>
    </div>
</div>

<script>
function openBox(){
    const box = document.getElementById("box");
    if(!box.classList.contains('open')) {
        box.classList.add("open");
        document.getElementById("title").style.opacity = "0";
        createHearts(); // Тепер літають серця!
    }
}

function createHearts() {
    const body = document.querySelector('body');
    const colors = ['#ff4d6d', '#ff758c', '#ff8fa3', '#ffb3c1']; // Різні відтінки рожевого
    
    for (let i = 0; i < 40; i++) {
        let heart = document.createElement('div');
        heart.className = 'heart-particle';
        heart.innerHTML = '❤'; // Символ серця
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // Різна швидкість
        heart.style.delay = (Math.random() * 2) + 's';
        heart.style.opacity = Math.random();
        heart.style.fontSize = Math.random() * 20 + 15 + 'px';
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        body.appendChild(heart);
    }
}
</script>

</body>
</html>
